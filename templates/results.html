<!-- templates/results.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Results for: "{{ query }}" ({{ index_type|upper }})</h1>
        <a href="/">New search</a>
        
        <div class="results">
            {% for result in results %}
            <div class="result">
                <h3>
                    <a href="{{ result.url }}">{{ result.title }}</a>
                    <span class="score">{{ "%.2f"|format(result.score) }}</span>
                </h3>
                <p>{{ result.content }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
